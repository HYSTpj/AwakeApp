name: Flutter CI  # 処理の名前

on:               # 実行するタイミング
  push:           # コードがpushされた時
  pull_request:   # プルリクエスト作成・更新時

jobs:
  test:           # 実行する作業の名前
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true # キャッシュを有効にすると2回目以降が速くなります

      - name: Install dependencies
        run: flutter pub get

      - name: Create firebase_options.dart
        run: |
          mkdir -p lib/data
          cat <<'EOF' > lib/data/firebase_options.dart
          ${{ secrets.FIREBASE_OPTIONS }}
          EOF

      - name: Static Analysis
        run: flutter analyze

      # 脆弱性のあるパッケージをチェック
      - name: Security scan with OSV-Scanner
        uses: google/osv-scanner-action/osv-scanner-action@v1
        with:
          scan-args: ./pubspec.lock

      - name: Run tests
        run: flutter test