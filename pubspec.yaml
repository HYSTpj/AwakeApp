# アプリ名
name: flutter_application_1

# 説明
description: "A new Flutter project."

# "flutter pub get" を実行して，pub.dev からパッケージをダウンロード
# "flutter pub publish" は，自分が作ったパッケージを世界中に公開するためのもの
publish_to: 'none' # pub.devに公開する場合はこの行を削除

# 以下は，アプリケーションのバージョンとビルド番号を定義
# バージョン番号は，1.2.43のようにドットで区切られた3つの数字
# その後に，+ で区切られたオプションのビルド番号が続く
# Flutterではバージョンとビルダー番号の両方を上書きできる
# --build-name と --build-number をそれぞれ指定してビルド
# Androidでは，ビルド名がバージョン名として使用され，ビルド番号がバージョンコードとして使用される
# Android のバージョン管理の詳細については，https://developer.android.com/studio/publish/versioning を参照
# iOSでは，build-nameはCFBundleShortVersionStringとして使用され、build-numberはCFBundleVersionとして使用される
# iOSのバージョン管理の詳細については，以下を参照
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# Windowsでは，ビルド名は製品およびファイルバージョンのメジャーバージョン，マイナーバージョン，パッチバージョンを表す部分として使用され，
# ビルド番号はビルドサフィックスとして使用される

# アプリのバージョン
version: 1.0.0+1

# 環境設定
environment:
  # Dartのバージョン
  sdk: ^3.11.1

# Dependenciesとは，パッケージが動作するために必要な他のパッケージを指定するもの
# パッケージのdependenciesを最新バージョンに自動的にアップグレードするには
# "flutter pub upgrade --major-versions" を実行，または，
# 以下のバージョン番号を pub.dev で利用可能な最新バージョンに変更することで，
# dependenciesを手動で更新できる
# どのdependenciesに新しいバージョンが利用可能かを確認するには
# "flutter pub outdated" を実行
dependencies:

  # Flutter本体の機能を使うためのパッケージ
  flutter:
    sdk: flutter

  # 以下の手順で，アプリケーションにCupertino Iconsフォントが追加されます。
  # iOSスタイルのアイコンには，CupertinoIconsクラスと組み合わせて使用​

  # iPhone風のアイコンを使えるパッケージ
  cupertino_icons: ^1.0.8

  # Firebaseを使うためのパッケージ追加
  firebase_core: ^4.5.0

  # Supabaseを使うためのパッケージ追加
  supabase_flutter: ^2.12.0

  # GPSを使うためのパッケージ追加
  geolocator: ^14.0.2

  # Google Map を使うためのパッケージ追加
  google_maps_flutter: ^2.16.0

  # 住所を緯度経度に変換するためのパッケージ追加
  geocoding: ^4.0.0
  http: ^1.6.0

# 開発用ツール
dev_dependencies:

  # 開発中にテストするためのツール
  flutter_test:
    sdk: flutter

  # 以下の「flutter_lints」パッケージには、優れたコーディング習慣を促進するための推奨リンターセットが含まれている
  # このパッケージで提供されるリンターセットは
  # パッケージのルートにある "analysis_options.yaml" ファイルで有効化される
  # 特定のリンタールールを無効化したり，追加のルールを有効化したりする方法については，
  # このファイルを参照する
  flutter_lints: ^6.0.0

# このファイルの汎用 Dart 部分に関する情報については，次のページを参照
# https://dart.dev/tools/pub/pubspec

# 以下のセクションは，Flutterパッケージに特化した内容
flutter:

  # 次の行は，Material Icons フォントがアプリケーションに確実に含まれるようにし，
  # Material Icons クラスのアイコンを使用できるようにする
  uses-material-design: true

  # アプリケーションにアセットを追加するには，次のようにアセットセクションを追加
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg

  # 画像アセットは，1つ以上の解像度固有の「バリアント」を参照できる
  # https://flutter.dev/to/resolution-aware-images

  # パッケージ依存関係からアセットを追加する方法の詳細については，以下を参照
  # https://flutter.dev/to/asset-from-package

  # アプリケーションにカスタムフォントを追加するには，この「flutter」セクションにフォントセクションを追加

  # このリストの各エントリには，
  # フォントファミリー名を含む「family」キーと，
  # フォントのアセットやその他の記述子を含むリストを含む「fonts」キーが必要
  # 例：
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # パッケージ依存関係のフォントの詳細については，以下を参照
  # https://flutter.dev/to/font-from-package
